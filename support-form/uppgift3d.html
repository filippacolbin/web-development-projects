<!-- HTML förbättrad -->
<!-- Eftersom jag använder mig av mycket samma kod till olika delar -->
<!-- Kommenterar jag bara varje sak en gång för bättre läslighet i koden -->
<!DOCTYPE html>
<html lang="sv">
<head>
    <!-- NYTT: Används för responstiv design på hemsidan -->
    <!-- NYTT:Ställer in enhetens skärmbredd och skalar webbplatsen korrekt -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Supportformulär</title>

    <!-- Koppling till stilmall -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Formulär som skickar data med POST till angiven sida -->
<form action="https://swplayground.ltu.se/resources/parse_form.php" method="POST">

    <h1>Supportformulär</h1>

    <p>Här kan du skicka ditt ärende till vår supportavdelning</p>

    <!-- Fält för namn -->
    <!-- input type = "text" definerar fältet för textinmatning -->
    <!-- NYTT: id kopplar select-fältet med label  -->
    <!-- NYTT: Placeholder för att visa användaren vad den ska skriva-->
    <!-- NYTT: requierd kontrollerar att den är ifylld -->
    <label for="namn">Ditt namn:</label>
    <input type="text" id="namn" name="namn" 
    placeholder="Ditt namn"
    required>
     

    <!-- Fält för telefon -->
    <!-- NYTT: Pattern validerar formatet -->
    <label for="telefon">Telefon:</label>
    <input type="tel" id="telefon" name="telefon"
    pattern="[0-9+\-\s]{6,15}"
    placeholder="070-1234567"
    required>
    

    <!-- Fält för e-post -->
    <!-- NYTT: type=email för automatisk validering -->
    <label for="epost">E-post:</label>
    <input type="email" id="epost" name="epost"
    placeholder="epost@example.com"
    required>

    <!-- Dropdown för prioritet -->
    <!-- Select skapar lista där man väljer alternativ-->
    <label for="prioritet">Prioritet:</label>
    <!-- Select: Skapar en dropdown-lista-->
    <!-- "Name": Namnet på variabeln-->
    <select id="prioritet" name="prioritet">

    <!-- "Option": Ett val i listan-->
    <option value="1">Låg</option>
    <option value="2">Normal</option>
    <option value="3">Hög</option>
    </select>


    <!-- NYTT: fieldset + legend istället för label för bättre tillgänglighet-->
    <!-- NYTT: fieldset grupperar element i ett formulär-->
    <fieldset>
        <!-- NYTT: legend ger gruppen en titel-->
        <legend>Tilldela till ort:</legend>
        <!-- Radioknappar för ort -->
        <!-- Radioknappar för typattributet radio för ett välja ett alternativ i taget -->
        <!-- Input type="radio": Används för att deklarera att det är en radiokanpp-->
        <!-- "Name": Binder knapp med grupp -->
        <!-- "Value": Värdet som skrickas till servern -->
        <label><input type="radio" name="ort" value="gbg"> Göteborg</label>
        <label><input type="radio" name="ort" value="sthlm"> Stockholm</label>
        <label><input type="radio" name="ort" value="ume"> Umeå</label>
        <label><input type="radio" name="ort" value="lule"> Luleå</label>
    </fieldset>


    <!-- Dropdown för kategori -->
    <label for="kategori">Kategori:</label>
    <select id="kategori" name="kategori">
        <option value="fakt">Fakturering</option>
        <option value="net">Internet</option>
        <option value="tel">Telefoni</option>
        <option value="epost">Epost</option>
    </select>

    <!-- Rubrik -->
    <label for="rubrik">Rubrik:</label>
    <input type="text" id="rubrik" name="rubrik"
    placeholder="Rubrik"
    required>

    <!-- Beskrivning -->
    <!-- NYTT: minlength för minsta antal tecken -->
    <label for="beskrivning">Beskrivning:</label>
    <textarea id="beskrivning" name="beskrivning" class="box"
    placeholder="Beskriv ditt ärende här..."
    minlength="10"
    required></textarea>

    <!-- NYTT: Buttons istället för input för submit och reset-->
    <!-- NYTT: ersätter tidigare för enklare kontroll över endast dessa knappar -->
    <div class="buttons">
        <input type="submit" name="skicka" value="Submit">
        <input type="reset" value="Reset">
    </div>

    </form>
</body>
</html>
