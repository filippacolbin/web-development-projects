<!DOCTYPE html>
<html lang="sv">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Supportformulär</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Formulär som skickar data med POST till angiven sida -->
<form action="https://swplayground.ltu.se/resources/parse_form.php" method="POST">

    <h1>Supportformulär</h1>

    <p>Här kan du skicka ditt ärende till vår supportavdelning</p>
    
    <label for="namn">Ditt namn:</label>
    <input type="text" id="namn" name="namn" 
    placeholder="Ditt namn"
    required>
     
    <label for="telefon">Telefon:</label>
    <input type="tel" id="telefon" name="telefon"
    pattern="[0-9+\-\s]{6,15}"
    placeholder="070-1234567"
    required>

    <label for="epost">E-post:</label>
    <input type="email" id="epost" name="epost"
    placeholder="epost@example.com"
    required>

    <label for="prioritet">Prioritet:</label>

    <select id="prioritet" name="prioritet">

    <option value="1">Låg</option>
    <option value="2">Normal</option>
    <option value="3">Hög</option>
    </select>

    <fieldset>
        <legend>Tilldela till ort:</legend>
        <label><input type="radio" name="ort" value="gbg"> Göteborg</label>
        <label><input type="radio" name="ort" value="sthlm"> Stockholm</label>
        <label><input type="radio" name="ort" value="ume"> Umeå</label>
        <label><input type="radio" name="ort" value="lule"> Luleå</label>
    </fieldset>

    <label for="kategori">Kategori:</label>
    <select id="kategori" name="kategori">
        <option value="fakt">Fakturering</option>
        <option value="net">Internet</option>
        <option value="tel">Telefoni</option>
        <option value="epost">Epost</option>
    </select>

    <label for="rubrik">Rubrik:</label>
    <input type="text" id="rubrik" name="rubrik"
    placeholder="Rubrik"
    required>

    <label for="beskrivning">Beskrivning:</label>
    <textarea id="beskrivning" name="beskrivning" class="box"
    placeholder="Beskriv ditt ärende här..."
    minlength="10"
    required></textarea>

    <div class="buttons">
        <input type="submit" name="skicka" value="Submit">
        <input type="reset" value="Reset">
    </div>

    </form>
</body>
</html>
